name: Release

on:
  workflow_dispatch:

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v8.0.0
        with:
          python-version: "3.13"

      - run: uv sync --dev

      - name: Run linters
        run: make lint

  unit-test:
    name: Unit Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
      fail-fast: false
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v8.0.0
        with:
          python-version: ${{ matrix.python-version }}

      - run: uv sync --dev

      - name: Run unit tests
        run: make test

  bump-and-release:
    name: Bump, Build & Release
    needs: [lint, unit-test]
    runs-on: ubuntu-latest
    outputs:
      released: ${{ steps.bump.outputs.bumped }}
      version: ${{ steps.bump.outputs.version }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: astral-sh/setup-uv@v8.0.0
        with:
          python-version: "3.13"

      - run: uv sync --dev

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version
        id: bump
        run: |
          if uv run cz bump --yes --changelog 2>&1; then
            VERSION=$(uv run cz version --project)
            echo "bumped=true" >> "$GITHUB_OUTPUT"
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
            echo "Bumped to $VERSION"
          else
            echo "bumped=false" >> "$GITHUB_OUTPUT"
            echo "No bumpable commits found — skipping release"
          fi

      - name: Build sdist and wheel
        if: steps.bump.outputs.bumped == 'true'
        run: uv build

      - name: Push bump commit and tag
        if: steps.bump.outputs.bumped == 'true'
        run: |
          git push origin ${{ github.ref_name }}
          git push origin "v${{ steps.bump.outputs.version }}"

      - name: Check if release already exists
        if: steps.bump.outputs.bumped == 'true'
        id: check-release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "v${{ steps.bump.outputs.version }}" &>/dev/null; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Release v${{ steps.bump.outputs.version }} already exists — skipping"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract changelog for release
        if: steps.bump.outputs.bumped == 'true' && steps.check-release.outputs.exists != 'true'
        id: changelog
        run: |
          # Extract the section between the first and second ## headings
          awk '/^## v/{if(found) exit; found=1; next} found' CHANGELOG.md > /tmp/release-notes.md

      - name: Create GitHub release
        if: steps.bump.outputs.bumped == 'true' && steps.check-release.outputs.exists != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "v${{ steps.bump.outputs.version }}" \
            --title "v${{ steps.bump.outputs.version }}" \
            --notes-file /tmp/release-notes.md
