[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "yoto-library"
version = "0.1.0"
description = "Manage Yoto CYO playlists as folders on disk"
requires-python = ">=3.10"
dependencies = [
    "click>=8.0",
    "httpx>=0.27",
    "keyring>=25.0",
    "numpy>=1.0",
    "Pillow>=10.0",
    "openai>=1.0",
    "together>=1.0",
    "google-genai>=1.0",
    "anthropic>=0.40",
    "python-dotenv>=1.0",
    "rich>=13.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-mock>=3.0",
    "pytest-tmp-files>=0.0.2",
    "ruff>=0.11",
    "ty>=0.0.1a7",
    "iterm2>=2.0",
]
iterm2 = [
    "iterm2>=2.0",
]

[project.scripts]
yoto = "yoto_cli.main:cli"

[tool.hatch.build.targets.wheel]
packages = ["src/yoto_lib", "src/yoto_cli"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
markers = [
    "integration: tests requiring network access and external tools (yt-dlp)",
]

[tool.ruff]
target-version = "py310"
line-length = 120

[tool.ruff.lint]
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # pyflakes
    "I",    # isort
    "UP",   # pyupgrade
    "B",    # bugbear
    "SIM",  # simplify
    "PT",   # pytest style
    "RUF",  # ruff-specific
    "S",    # bandit security
    "FA",   # future annotations
]

[tool.ruff.lint.per-file-ignores]
"tests/**/*.py" = ["S101", "S105", "S106", "S108"]  # allow assert and test fixtures with fake secrets/paths
# Subprocess calls are intentional throughout (ffmpeg, mkvtoolnix, yt-dlp, osascript, claude CLI)
"src/yoto_cli/commands/lyrics.py" = ["S603", "S607"]
"src/yoto_cli/main.py" = ["S603", "S607"]
"src/yoto_lib/billing/__init__.py" = ["S607"]
"src/yoto_lib/covers/printer.py" = ["S603", "S607"]
"src/yoto_lib/icons/macos.py" = ["S603", "S607"]
"src/yoto_lib/lyrics/lyrics_scrape.py" = ["S603"]
"src/yoto_lib/mka.py" = ["S603"]
"src/yoto_lib/providers/claude_provider.py" = ["S603", "S607"]
"src/yoto_lib/track_sources/youtube.py" = ["S101", "S603", "S607"]
"tests/covers/test_itunes.py" = ["S607"]
"tests/lyrics/test_lyrics_cli.py" = ["S607"]
"tests/test_mka.py" = ["S607"]
"tests/test_roundtrip.py" = ["S607"]
"tests/conftest.py" = ["S603", "S607"]
# S101 in source (assert used as guard in non-test code)
"src/yoto_lib/covers/cover.py" = ["S101"]
# S311: random.choice for picking a sample song, not cryptographic
"src/yoto_lib/lyrics/lyrics_source_wizard.py" = ["S311"]

[tool.ruff.lint.isort]
known-first-party = ["yoto_lib", "yoto_cli"]

[tool.ty.environment]
python-version = "3.10"
root = ["src"]

